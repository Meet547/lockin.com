<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCKIN</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <!-- header -->
      <div class="header">
        <div class="brand">
          <svg class="logo" viewBox="0 0 24 24" fill="none">
            <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            <rect x="5" y="10" width="14" height="10" rx="2.5" stroke="currentColor" stroke-width="1.6" />
            <circle cx="12" cy="15" r="1.4" fill="currentColor" />
          </svg>
          <span class="brand-name">LOCKIN</span>
          <span class="version">v1.3</span>
        </div>
        <span id="status-pill" class="pill pill-idle">Idle</span>
      </div>

      <!-- active countdown -->
      <div id="active-card" class="active-card hidden">
        <p class="eyebrow">Remaining</p>
        <p id="countdown" class="countdown">00:00:00</p>
        <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>
        <button id="end-btn" class="btn btn-primary">End Session</button>
      </div>

      <!-- mode selector -->
      <div class="field">
        <p class="eyebrow">Focus Mode</p>
        <div class="mode-grid">
          <button class="mode-btn" data-mode="easy">
            <svg viewBox="0 0 24 24" fill="none" class="mode-icon"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Easy
          </button>
          <button class="mode-btn" data-mode="hard">
            <svg viewBox="0 0 24 24" fill="none" class="mode-icon"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Hard
          </button>
          <button class="mode-btn active" data-mode="monk">
            <svg viewBox="0 0 24 24" fill="none" class="mode-icon"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Monk
          </button>
        </div>
      </div>

      <!-- duration -->
      <div class="field">
        <div class="field-row">
          <p class="eyebrow">Duration</p>
          <span class="mono-small" id="dur-label">90 min</span>
        </div>
        <div class="dur-grid">
          <button class="dur-btn" data-dur="15">15</button>
          <button class="dur-btn" data-dur="25">25</button>
          <button class="dur-btn" data-dur="45">45</button>
          <button class="dur-btn active" data-dur="90">90</button>
        </div>
      </div>

      <!-- block list -->
      <div class="field">
        <div class="field-row">
          <p class="eyebrow">Blocked Sites · <span id="site-count">0</span></p>
        </div>
        <div class="add-row">
          <svg class="add-icon" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input id="site-input" type="text" placeholder="Add a website…" />
          <button id="add-btn" class="add-go">Add</button>
        </div>
        <div id="site-chips" class="chips"></div>
      </div>

      <!-- start -->
      <button id="start-btn" class="btn btn-primary btn-full">Start Session</button>

      <!-- test blocking (only visible when active) -->
      <button id="test-btn" class="btn btn-secondary btn-full hidden">Test Blocking</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
