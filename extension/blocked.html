<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCKIN — Site Blocked</title>
    <link rel="stylesheet" href="blocked.css" />
  </head>
  <body>
    <main class="wrap">
      <div class="ambient"></div>

      <!-- top bar -->
      <div class="topbar">
        <div class="brand">
          <svg class="logo" viewBox="0 0 24 24" fill="none">
            <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <rect x="5" y="10" width="14" height="10" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="12" cy="15" r="1.4" fill="currentColor"/>
          </svg>
          <span class="brand-name">LOCKIN</span>
        </div>
        <button id="back-btn" class="link-btn">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Go back
        </button>
      </div>

      <div class="content">
        <!-- lock logo -->
        <div class="lock-badge">
          <svg viewBox="0 0 24 24" fill="none" width="28" height="28">
            <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <rect x="5" y="10" width="14" height="10" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="12" cy="15" r="1.4" fill="currentColor"/>
          </svg>
        </div>

        <!-- status pill -->
        <div class="pill"><span class="dot"></span>Focus Mode Active</div>

        <h1 class="headline">This site is blocked.</h1>
        <p class="sub">You chose to lock this. The discomfort you feel right now is the work happening. Stay.</p>

        <!-- countdown -->
        <div class="countdown-card">
          <p class="eyebrow">Remaining Time</p>
          <p id="countdown" class="countdown">00:00:00</p>
          <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>
          <div class="meta">
            <svg viewBox="0 0 24 24" fill="none" width="12" height="12"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M3 12h18M12 3c2.5 2.5 3.8 5.6 3.8 9s-1.3 6.5-3.8 9c-2.5-2.5-3.8-5.6-3.8-9s1.3-6.5 3.8-9z" stroke="currentColor" stroke-width="1.6"/></svg>
            <span id="site-name" class="mono">—</span>
            <span>·</span>
            <span id="mode-name">Monk Mode</span>
          </div>
        </div>

        <!-- quote -->
        <blockquote id="quote" class="quote">"…"</blockquote>
        <p id="author" class="author">—</p>
      </div>
    </main>

    <script src="blocked.js"></script>
  </body>
</html>
